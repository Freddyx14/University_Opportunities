<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Cuenta activada! - Novo</title>
    <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='images/logo-novo.svg') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/logo-novo.svg') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen px-4">

    <div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 text-center transform transition-all hover:scale-[1.01]">
        
        <!-- Logo -->
        <img src="{{ url_for('static', filename='images/logo-novo.svg') }}" alt="Novo" class="mx-auto h-16 w-16 rounded-xl mb-4">

        <!-- Icono Check -->
        <div class="mx-auto flex items-center justify-center h-12 w-12 rounded-full bg-green-100 mb-6">
            <svg class="h-6 w-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
        </div>

        <!-- Títulos -->
        <h1 class="text-2xl font-bold text-gray-900 mb-2">
            ¡Cuenta activada con éxito!
        </h1>
        
        <p class="text-gray-600 mb-8 leading-relaxed">
            Tu perfil ha sido verificado. Ahora Novo puede empezar a buscar las mejores oportunidades para ti.
        </p>

        <!-- Botón -->
        <a href="https://university-opportunities.vercel.app/login" 
           class="inline-block w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 px-6 rounded-lg transition duration-200 shadow-md hover:shadow-lg transform active:scale-95">
            Iniciar sesión
        </a>
        
        <!-- Footer simple -->
        <p class="mt-8 text-xs text-center text-gray-400">
            &copy; 2026 Novo. Todos los derechos reservados.
        </p>

    </div>

</body>
</html>
