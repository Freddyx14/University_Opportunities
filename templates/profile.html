<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Novo - Profile Upload</title>
    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen">
    <div class="container mx-auto px-4 py-12 max-w-4xl">
        <!-- Header -->
        <div class="text-center mb-12">
            <h1 class="text-5xl font-bold text-indigo-900 mb-4">Novo</h1>
            <p class="text-xl text-indigo-700">Hyper-personalized Career Agent for University Students</p>
            <p class="text-lg text-indigo-600 mt-2">Upload your profile to get started</p>
        </div>

        <!-- Upload Form -->
        <div class="bg-white rounded-2xl shadow-xl p-8">
            <form id="profileForm" enctype="multipart/form-data" class="space-y-8">
                <!-- CV Upload Section -->
                <div class="space-y-4">
                    <label class="block">
                        <span class="text-gray-700 font-semibold text-lg">Curriculum Vitae (PDF)</span>
                        <div class="mt-2 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg hover:border-indigo-400 transition-colors">
                            <div class="space-y-2 text-center">
                                <svg class="mx-auto h-12 w-12 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48">
                                    <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                                </svg>
                                <div class="flex text-sm text-gray-600">
                                    <label for="cv_file" class="relative cursor-pointer bg-white rounded-md font-medium text-indigo-600 hover:text-indigo-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-indigo-500">
                                        <span>Upload a PDF file</span>
                                        <input id="cv_file" name="cv_file" type="file" accept=".pdf" class="sr-only" required>
                                    </label>
                                    <p class="pl-1">or drag and drop</p>
                                </div>
                                <p class="text-xs text-gray-500">PDF up to 16MB</p>
                                <p id="cv_file_name" class="text-sm text-indigo-600 font-medium hidden"></p>
                            </div>
                        </div>
                    </label>
                </div>

                <!-- Audio Upload Section -->
                <div class="space-y-4">
                    <label class="block">
                        <span class="text-gray-700 font-semibold text-lg">Brain Dump (Audio)</span>
                        <div class="mt-2 flex justify-center px-6 pt-5 pb-6 border-2 border-gray-300 border-dashed rounded-lg hover:border-indigo-400 transition-colors">
                            <div class="space-y-2 text-center">
                                <svg class="mx-auto h-12 w-12 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11a7 7 0 01-7 7m0 0a7 7 0 01-7-7m7 7v4m0 0H8m4 0h4m-4-8a3 3 0 01-3-3V5a3 3 0 116 0v6a3 3 0 01-3 3z" />
                                </svg>
                                <div class="flex text-sm text-gray-600">
                                    <label for="audio_file" class="relative cursor-pointer bg-white rounded-md font-medium text-indigo-600 hover:text-indigo-500 focus-within:outline-none focus-within:ring-2 focus-within:ring-offset-2 focus-within:ring-indigo-500">
                                        <span>Upload an audio file</span>
                                        <input id="audio_file" name="audio_file" type="file" accept=".mp3,.wav,.m4a,.ogg" class="sr-only">
                                    </label>
                                    <p class="pl-1">or drag and drop</p>
                                </div>
                                <p class="text-xs text-gray-500">MP3, WAV, M4A, or OGG up to 16MB (optional)</p>
                                <p id="audio_file_name" class="text-sm text-indigo-600 font-medium hidden"></p>
                            </div>
                        </div>
                    </label>
                </div>

                <!-- Submit Button -->
                <div class="pt-4">
                    <button type="submit" id="submitBtn" class="w-full bg-indigo-600 text-white py-4 px-6 rounded-lg font-semibold text-lg hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors disabled:bg-gray-400 disabled:cursor-not-allowed">
                        Analyze Profile
                    </button>
                </div>

                <!-- Loading Spinner (Hidden by default) -->
                <div id="loading" class="hidden text-center py-4">
                    <div class="inline-block animate-spin rounded-full h-8 w-8 border-b-2 border-indigo-600"></div>
                    <p class="mt-2 text-indigo-600">Processing your profile...</p>
                </div>

                <!-- Success/Error Messages -->
                <div id="message" class="hidden rounded-lg p-4"></div>
            </form>
        </div>
    </div>

    <script>
        // Handle file name display
        document.getElementById('cv_file').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            const fileNameDisplay = document.getElementById('cv_file_name');
            if (fileName) {
                fileNameDisplay.textContent = `Selected: ${fileName}`;
                fileNameDisplay.classList.remove('hidden');
            }
        });

        document.getElementById('audio_file').addEventListener('change', function(e) {
            const fileName = e.target.files[0]?.name;
            const fileNameDisplay = document.getElementById('audio_file_name');
            if (fileName) {
                fileNameDisplay.textContent = `Selected: ${fileName}`;
                fileNameDisplay.classList.remove('hidden');
            }
        });

        // Handle form submission
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const submitBtn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const message = document.getElementById('message');
            
            // Show loading state
            submitBtn.disabled = true;
            loading.classList.remove('hidden');
            message.classList.add('hidden');
            
            try {
                const response = await fetch('/profile', {
                    method: 'POST',
                    body: formData,
                    redirect: 'follow'
                });
                
                // Check if response was redirected to /results
                if (response.url && response.url.includes('/results')) {
                    window.location.href = '/results';
                    return;
                }
                
                // If not redirected, check for JSON response (errors)
                if (response.ok) {
                    const contentType = response.headers.get('content-type');
                    if (contentType && contentType.includes('application/json')) {
                        const data = await response.json();
                        // If there's a result, redirect to results
                        if (data.result) {
                            window.location.href = '/results';
                            return;
                        }
                        // Otherwise show success message
                        loading.classList.add('hidden');
                        submitBtn.disabled = false;
                        message.classList.remove('hidden');
                        message.className = 'bg-green-100 border border-green-400 text-green-700 rounded-lg p-4';
                        message.textContent = `Success: ${data.message || 'Profile analyzed successfully!'}`;
                    } else {
                        // Response is HTML (shouldn't happen, but redirect anyway)
                        window.location.href = '/results';
                        return;
                    }
                } else {
                    const data = await response.json().catch(() => ({ error: 'Unknown error occurred' }));
                    loading.classList.add('hidden');
                    submitBtn.disabled = false;
                    message.classList.remove('hidden');
                    message.className = 'bg-red-100 border border-red-400 text-red-700 rounded-lg p-4';
                    message.textContent = `Error: ${data.error || 'Something went wrong'}`;
                }
            } catch (error) {
                loading.classList.add('hidden');
                submitBtn.disabled = false;
                message.classList.remove('hidden');
                message.className = 'bg-red-100 border border-red-400 text-red-700 rounded-lg p-4';
                message.textContent = `Error: ${error.message}`;
            }
        });
    </script>
</body>
</html>
